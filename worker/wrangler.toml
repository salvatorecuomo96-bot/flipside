name = "epistemic-companion-proxy"
main = "index.js"
compatibility_date = "2024-01-01"

# No KV, no Durable Objects, no paid features — pure free tier.
# The GROQ_API_KEY secret is set via: wrangler secret put GROQ_API_KEY
# It will never appear in this file.

# Per-IP rate limiting via Cloudflare's native Rate Limiting binding (free, no
# storage). Stops a single client from bursting through the shared daily quota.
# limit = requests allowed per `period` seconds, per key (we key on client IP).
# period must be 10 or 60. namespace_id is any unique number you pick per limiter.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 15, period = 60 }

# Workers AI binding — free native inference, separate quota from Groq.
# No key needed; Cloudflare bills neurons against the account's free allowance.
# On the Workers free plan this simply stops rather than billing.
[ai]
binding = "AI"

# KV cache — stores Groq results keyed by hash(url+text), TTL 6h.
# Only Groq results are cached (high quality); fallback provider results are not,
# so a rate-limited first-request can't poison the cache for everyone else.
[[kv_namespaces]]
binding = "CACHE"
id = "39c459bbb2444bf585c688c091c1264c"
